<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корочки.есть — Формирование заявки</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Корочки.есть</h1>
    <p id="welcomeText">Формирование заявки на обучение</p>

    <form id="applicationForm" action="#" method="post" novalidate>
      <div class="field">
        <label for="course">Наименование курса</label>
        <select id="course" name="course" required>
          <option value="">Выберите курс</option>
          <option value="Основы алгоритмизации и программирования">
            Основы алгоритмизации и программирования
          </option>
          <option value="Основы веб-дизайна">Основы веб-дизайна</option>
          <option value="Основы проектирования баз данных">
            Основы проектирования баз данных
          </option>
        </select>
        <p id="error-course" class="field-error" hidden></p>
      </div>

      <div class="field">
        <label for="startDate">Желаемая дата начала обучения</label>
        <input
          type="text"
          id="startDate"
          name="startDate"
          placeholder="ДД.ММ.ГГГГ"
          inputmode="numeric"
        />
        <p id="error-startDate" class="field-error" hidden></p>
      </div>

      <div class="field" id="payment">
        <span class="field-label">Способ оплаты</span>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="payment" value="cash" />
            Наличными
          </label>
          <label class="radio-option">
            <input type="radio" name="payment" value="phone" />
            Переводом по номеру телефона
          </label>
        </div>
        <p id="error-payment" class="field-error" hidden></p>
      </div>

      <div id="formSuccess" class="success" role="status" hidden></div>

      <button type="submit">Отправить</button>
    </form>

    <p class="link-row">
      <a href="applications.html">Мои заявки и отзывы</a>
      ·
      <a href="#" id="logoutLink">Выйти</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/form-utils.js"></script>
  <script>
    const currentUser = sessionStorage.getItem("currentUser");
    if (!currentUser) window.location.href = "login.html";

    document.getElementById("welcomeText").textContent =
      "Здравствуйте, " + currentUser + "! Заполните заявку для отправки администратору портала.";

    const applicationForm = document.getElementById("applicationForm");
    const formSuccess = document.getElementById("formSuccess");
    const datePattern = /^(0[1-9]|[12][0-9]|3[01])\.(0[1-9]|1[0-2])\.(19|20)\d{2}$/;
    const fields = ["course", "startDate", "payment"];

    document.getElementById("course").addEventListener("change", function () {
      clearFieldError("course");
    });
    document.getElementById("startDate").addEventListener("input", function () {
      clearFieldError("startDate");
    });
    document.querySelectorAll('input[name="payment"]').forEach(function (el) {
      el.addEventListener("change", function () {
        clearFieldError("payment");
      });
    });

    applicationForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      clearFormErrors(fields);
      formSuccess.hidden = true;

      const course = document.getElementById("course").value;
      const startDate = document.getElementById("startDate").value.trim();
      const paymentInput = document.querySelector('input[name="payment"]:checked');
      let valid = true;

      if (!course) {
        setFieldError("course", "Выберите курс из списка.");
        valid = false;
      }
      if (!startDate) {
        setFieldError("startDate", "Укажите желаемую дату начала обучения.");
        valid = false;
      } else if (!datePattern.test(startDate)) {
        setFieldError("startDate", "Дата должна быть в формате ДД.ММ.ГГГГ.");
        valid = false;
      }
      if (!paymentInput) {
        setFieldError("payment", "Выберите способ оплаты.");
        valid = false;
      }
      if (!valid) return;

      const { ok, data } = await apiRequest("/applications", {
        method: "POST",
        body: JSON.stringify({ course, startDate, payment: paymentInput.value }),
      });

      if (!ok) {
        const msg = data.message || "Ошибка отправки заявки.";
        if (msg.includes("курс")) setFieldError("course", msg);
        else if (msg.includes("Дата") || msg.includes("дат")) setFieldError("startDate", msg);
        else if (msg.includes("оплат")) setFieldError("payment", msg);
        else setFieldError("course", msg);
        return;
      }

      formSuccess.textContent = data.message;
      formSuccess.hidden = false;
      applicationForm.reset();
    });

    document.getElementById("logoutLink").addEventListener("click", async function (event) {
      event.preventDefault();
      await apiRequest("/logout", { method: "POST" });
      sessionStorage.clear();
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
