<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корочки.есть — Регистрация</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Корочки.есть</h1>
    <p>Регистрация в системе записи на онлайн-курсы дополнительного профессионального образования</p>

    <form id="registerForm" action="#" method="post" novalidate>
      <div class="field">
        <label for="login">Логин</label>
        <input type="text" id="login" name="login" placeholder="user123" autocomplete="username" />
        <p id="error-login" class="field-error" hidden></p>
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 8 символов" autocomplete="new-password" />
        <p id="error-password" class="field-error" hidden></p>
      </div>

      <div class="field">
        <label for="fio">ФИО</label>
        <input type="text" id="fio" name="fio" placeholder="Иванов Иван Иванович" />
        <p id="error-fio" class="field-error" hidden></p>
      </div>

      <div class="field">
        <label for="phone">Телефон</label>
        <input type="text" id="phone" name="phone" placeholder="8(999)999-99-99" />
        <p id="error-phone" class="field-error" hidden></p>
      </div>

      <div class="field">
        <label for="email">Электронная почта</label>
        <input type="email" id="email" name="email" placeholder="mail@example.com" autocomplete="email" />
        <p id="error-email" class="field-error" hidden></p>
      </div>

      <button type="submit">Зарегистрироваться</button>
      <div class="note">Все поля обязательны для заполнения</div>
    </form>

    <p class="link-row">
      Уже зарегистрированы?
      <a href="login.html">Авторизация</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/form-utils.js"></script>
  <script>
    const registerForm = document.getElementById("registerForm");
    const fields = ["login", "password", "fio", "phone", "email"];
    const phonePattern = /^8\([0-9]{3}\)[0-9]{3}-[0-9]{2}-[0-9]{2}$/;
    const loginPattern = /^[A-Za-z0-9]{6,}$/;
    const fioPattern = /^[А-Яа-яЁё\s-]+$/;

    bindClearOnInput(fields);

    function validateRegisterForm() {
      clearFormErrors(fields);
      let valid = true;

      const login = document.getElementById("login").value.trim();
      const password = document.getElementById("password").value;
      const fio = document.getElementById("fio").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();

      if (!login) {
        setFieldError("login", "Введите логин.");
        valid = false;
      } else if (!loginPattern.test(login)) {
        setFieldError("login", "Логин: только латиница и цифры, минимум 6 символов.");
        valid = false;
      }

      if (!password) {
        setFieldError("password", "Введите пароль.");
        valid = false;
      } else if (password.length < 8) {
        setFieldError("password", "Пароль должен быть не короче 8 символов.");
        valid = false;
      }

      if (!fio) {
        setFieldError("fio", "Введите ФИО.");
        valid = false;
      } else if (!fioPattern.test(fio)) {
        setFieldError("fio", "ФИО: только кириллица, пробелы и дефис.");
        valid = false;
      }

      if (!phone) {
        setFieldError("phone", "Введите телефон.");
        valid = false;
      } else if (!phonePattern.test(phone)) {
        setFieldError("phone", "Формат телефона: 8(999)999-99-99.");
        valid = false;
      }

      if (!email) {
        setFieldError("email", "Введите e-mail.");
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError("email", "Некорректный адрес e-mail.");
        valid = false;
      }

      return valid
        ? { login, password, fio, phone, email }
        : null;
    }

    registerForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      const payload = validateRegisterForm();
      if (!payload) return;

      const { ok, data } = await apiRequest("/register", {
        method: "POST",
        body: JSON.stringify(payload),
      });

      if (!ok) {
        const msg = data.message || "Ошибка регистрации.";
        if (msg.includes("логин")) {
          setFieldError("login", msg);
        } else if (msg.includes("e-mail") || msg.includes("mail")) {
          setFieldError("email", msg);
        } else if (msg.includes("телефон")) {
          setFieldError("phone", msg);
        } else if (msg.includes("ФИО")) {
          setFieldError("fio", msg);
        } else if (msg.includes("Пароль")) {
          setFieldError("password", msg);
        } else if (msg.includes("Логин")) {
          setFieldError("login", msg);
        } else {
          setFieldError("login", msg);
        }
        return;
      }

      window.location.href = "login.html";
    });
  </script>
</body>
</html>
