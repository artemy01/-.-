<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корочки.есть — Регистрация</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Корочки.есть</h1>
    <p>Регистрация в системе записи на онлайн-курсы дополнительного профессионального образования</p>

    <form id="registerForm" action="#" method="post">
      <div class="field">
        <label for="login">Логин</label>
        <input type="text" id="login" name="login" placeholder="user123" required minlength="6" pattern="[A-Za-z0-9]{6,}" />
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 8 символов" required minlength="8" />
      </div>

      <div class="field">
        <label for="fio">ФИО</label>
        <input type="text" id="fio" name="fio" placeholder="Иванов Иван Иванович" required pattern="[А-Яа-яЁё\s]+" />
      </div>

      <div class="field">
        <label for="phone">Телефон</label>
        <input
          type="text"
          id="phone"
          name="phone"
          placeholder="8(999)999-99-99"
          required
          pattern="8\([0-9]{3}\)[0-9]{3}-[0-9]{2}-[0-9]{2}"
          title="Формат: 8(999)999-99-99"
        />
      </div>

      <div class="field">
        <label for="email">Электронная почта</label>
        <input type="email" id="email" name="email" placeholder="mail@example.com" required />
      </div>

      <div id="registerError" class="error" role="alert" hidden></div>

      <button type="submit">Создать пользователя</button>
      <div class="note">Все поля обязательны для заполнения</div>
    </form>

    <p class="link-row">
      Уже зарегистрированы?
      <a href="login.html">Авторизация</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    const registerForm = document.getElementById("registerForm");
    const registerError = document.getElementById("registerError");
    const phonePattern = /^8\([0-9]{3}\)[0-9]{3}-[0-9]{2}-[0-9]{2}$/;

    registerForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      registerError.hidden = true;

      const login = document.getElementById("login").value.trim();
      const password = document.getElementById("password").value;
      const fio = document.getElementById("fio").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();

      if (!phonePattern.test(phone)) {
        registerError.textContent =
          "Неверный формат телефона. Укажите номер в виде 8(999)999-99-99.";
        registerError.hidden = false;
        return;
      }

      const { ok, data } = await apiRequest("/register", {
        method: "POST",
        body: JSON.stringify({ login, password, fio, phone, email }),
      });

      if (!ok) {
        registerError.textContent = data.message || "Ошибка регистрации.";
        registerError.hidden = false;
        return;
      }

      window.location.href = "login.html";
    });
  </script>
</body>
</html>
