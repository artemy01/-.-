<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корочки.есть — Авторизация</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Корочки.есть</h1>
    <p>Вход в систему для зарегистрированных пользователей</p>

    <form id="loginForm" action="#" method="post" novalidate>
      <div class="field">
        <label for="login">Логин</label>
        <input
          type="text"
          id="login"
          name="login"
          placeholder="user123"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Введите пароль"
          autocomplete="current-password"
        />
      </div>

      <div id="errorMessage" class="error" role="alert" hidden></div>

      <button type="submit">Войти</button>
    </form>

    <p class="link-row">
      Еще не зарегистрированы?
      <a href="register.html">Регистрация</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const loginInput = document.getElementById("login");
    const passwordInput = document.getElementById("password");
    const errorBox = document.getElementById("errorMessage");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.hidden = false;
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.hidden = true;
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      hideError();

      const login = loginInput.value.trim();
      const password = passwordInput.value;

      if (!login) {
        showError("Введите логин.");
        return;
      }

      if (!password) {
        showError("Введите пароль.");
        return;
      }

      const { ok, data } = await apiRequest("/login", {
        method: "POST",
        body: JSON.stringify({ login, password }),
      });

      if (!ok) {
        showError(data.message || "Ошибка входа.");
        return;
      }

      if (data.role === "admin") {
        sessionStorage.setItem("isAdmin", "true");
        sessionStorage.removeItem("currentUser");
        window.location.href = "admin.html";
        return;
      }

      sessionStorage.setItem("currentUser", data.login);
      sessionStorage.removeItem("isAdmin");
      window.location.href = "dashboard.html";
    });

    loginInput.addEventListener("input", hideError);
    passwordInput.addEventListener("input", hideError);
  </script>
</body>
</html>
