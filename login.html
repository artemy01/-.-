<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корочки.есть — Авторизация</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Корочки.есть</h1>
    <p>Вход в систему для зарегистрированных пользователей</p>

    <form id="loginForm" action="#" method="post" novalidate>
      <div class="field">
        <label for="login">Логин</label>
        <input
          type="text"
          id="login"
          name="login"
          placeholder="user123"
          autocomplete="username"
        />
        <p id="error-login" class="field-error" hidden></p>
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Введите пароль"
          autocomplete="current-password"
        />
        <p id="error-password" class="field-error" hidden></p>
      </div>

      <button type="submit">Войти</button>
    </form>

    <p class="link-row">
      Еще не зарегистрированы?
      <a href="register.html">Регистрация</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/form-utils.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const fields = ["login", "password"];

    bindClearOnInput(fields);

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      clearFormErrors(fields);

      const login = document.getElementById("login").value.trim();
      const password = document.getElementById("password").value;
      let valid = true;

      if (!login) {
        setFieldError("login", "Введите логин.");
        valid = false;
      }
      if (!password) {
        setFieldError("password", "Введите пароль.");
        valid = false;
      }
      if (!valid) return;

      const { ok, data } = await apiRequest("/login", {
        method: "POST",
        body: JSON.stringify({ login, password }),
      });

      if (!ok) {
        const msg = data.message || "Ошибка входа.";
        if (msg.includes("парол")) {
          setFieldError("password", msg);
        } else if (msg.includes("логин") || msg.includes("Пользователь")) {
          setFieldError("login", msg);
        } else {
          setFieldError("login", msg);
        }
        return;
      }

      if (data.role === "admin") {
        sessionStorage.setItem("isAdmin", "true");
        sessionStorage.removeItem("currentUser");
        window.location.href = "admin.html";
        return;
      }

      sessionStorage.setItem("currentUser", data.login);
      sessionStorage.removeItem("isAdmin");
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
