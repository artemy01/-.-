<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корочки.есть — Панель администратора</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <div class="card card-admin">
    <h1>Корочки.есть</h1>
    <p>Панель администратора — все заявки пользователей</p>

    <div class="admin-toolbar">
      <button type="button" id="clearTestDataBtn" class="button-danger">
        Очистить тестовые данные
      </button>
    </div>

    <div class="admin-filters">
      <div class="field field-inline">
        <label for="filterSearch">Поиск</label>
        <input type="search" id="filterSearch" placeholder="Логин или ФИО" />
      </div>
      <div class="field field-inline">
        <label for="filterStatus">Статус</label>
        <select id="filterStatus">
          <option value="">Все статусы</option>
          <option value="Новая">Новая</option>
          <option value="Идет обучение">Идет обучение</option>
          <option value="Обучение завершено">Обучение завершено</option>
        </select>
      </div>
      <div class="field field-inline">
        <label for="filterCourse">Курс</label>
        <select id="filterCourse">
          <option value="">Все курсы</option>
          <option value="Основы алгоритмизации и программирования">
            Основы алгоритмизации и программирования
          </option>
          <option value="Основы веб-дизайна">Основы веб-дизайна</option>
          <option value="Основы проектирования баз данных">
            Основы проектирования баз данных
          </option>
        </select>
      </div>
      <button type="button" id="resetFiltersBtn" class="button-secondary">Сбросить</button>
    </div>

    <p id="adminStats" class="admin-stats"></p>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Логин</th>
            <th>ФИО</th>
            <th>Курс</th>
            <th>Начало обучения</th>
            <th>Оплата</th>
            <th>Дата подачи</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>

    <p id="emptyAdmin" class="note" hidden>Заявок не найдено.</p>

    <div class="pagination" id="pagination" hidden>
      <button type="button" id="prevPageBtn" class="button-secondary">Назад</button>
      <span id="pageInfo" class="page-info"></span>
      <button type="button" id="nextPageBtn" class="button-secondary">Вперёд</button>
    </div>

    <p class="link-row">
      <a href="#" id="logoutLink">Выйти из панели</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/form-utils.js"></script>
  <script>
    if (sessionStorage.getItem("isAdmin") !== "true") {
      window.location.href = "login.html";
    }

    const STATUS_OPTIONS = ["Новая", "Идет обучение", "Обучение завершено"];
    const PAGE_SIZE = 5;

    let allApplications = [];
    let currentPage = 1;

    const tableBody = document.getElementById("adminTableBody");
    const emptyAdmin = document.getElementById("emptyAdmin");
    const pagination = document.getElementById("pagination");
    const pageInfo = document.getElementById("pageInfo");
    const adminStats = document.getElementById("adminStats");

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("ru-RU", {
        day: "2-digit", month: "2-digit", year: "numeric",
      });
    }

    function getFilteredApplications() {
      const search = document.getElementById("filterSearch").value.trim().toLowerCase();
      const status = document.getElementById("filterStatus").value;
      const course = document.getElementById("filterCourse").value;

      return allApplications.filter(function (app) {
        if (status && app.status !== status) return false;
        if (course && app.course !== course) return false;
        if (search) {
          const hay = (app.login + " " + app.fio).toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });
    }

    function renderTable() {
      const filtered = getFilteredApplications();
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));

      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      tableBody.innerHTML = "";
      emptyAdmin.hidden = pageItems.length > 0;
      pagination.hidden = filtered.length <= PAGE_SIZE;

      adminStats.textContent =
        "Всего заявок: " + allApplications.length +
        " · Показано по фильтру: " + filtered.length;

      if (pageItems.length === 0) {
        pageInfo.textContent = "";
        return;
      }

      pageItems.forEach(function (app) {
        const row = document.createElement("tr");
        const select = document.createElement("select");
        select.className = "status-select";
        select.setAttribute("aria-label", "Статус заявки " + app.login);

        STATUS_OPTIONS.forEach(function (status) {
          const option = document.createElement("option");
          option.value = status;
          option.textContent = status;
          if (status === app.status) option.selected = true;
          select.appendChild(option);
        });

        select.addEventListener("change", async function () {
          const newStatus = select.value;
          const { ok, data } = await apiRequest("/admin/applications", {
            method: "POST",
            body: JSON.stringify({ id: app.id, status: newStatus }),
          });
          if (ok) {
            app.status = newStatus;
            showToast("Статус заявки «" + app.login + "» обновлён: " + newStatus, "success");
          } else {
            select.value = app.status;
            showToast(data.message || "Не удалось обновить статус.", "error");
          }
        });

        row.innerHTML =
          "<td>" + escapeHtml(app.login) + "</td>" +
          "<td>" + escapeHtml(app.fio) + "</td>" +
          "<td>" + escapeHtml(app.course) + "</td>" +
          "<td>" + escapeHtml(app.startDate) + "</td>" +
          "<td>" + escapeHtml(app.paymentLabel) + "</td>" +
          "<td>" + formatDate(app.createdAt) + "</td>";

        const statusCell = document.createElement("td");
        statusCell.appendChild(select);
        row.appendChild(statusCell);
        tableBody.appendChild(row);
      });

      pageInfo.textContent = "Страница " + currentPage + " из " + totalPages;
      document.getElementById("prevPageBtn").disabled = currentPage <= 1;
      document.getElementById("nextPageBtn").disabled = currentPage >= totalPages;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadApplications() {
      const { ok, data } = await apiRequest("/admin/applications");
      if (!ok) {
        showToast(data.message || "Не удалось загрузить заявки.", "error");
        return;
      }
      allApplications = data.applications || [];
      currentPage = 1;
      renderTable();
    }

    document.getElementById("filterSearch").addEventListener("input", function () {
      currentPage = 1;
      renderTable();
    });
    document.getElementById("filterStatus").addEventListener("change", function () {
      currentPage = 1;
      renderTable();
    });
    document.getElementById("filterCourse").addEventListener("change", function () {
      currentPage = 1;
      renderTable();
    });
    document.getElementById("resetFiltersBtn").addEventListener("click", function () {
      document.getElementById("filterSearch").value = "";
      document.getElementById("filterStatus").value = "";
      document.getElementById("filterCourse").value = "";
      currentPage = 1;
      renderTable();
      showToast("Фильтры сброшены.", "info");
    });
    document.getElementById("prevPageBtn").addEventListener("click", function () {
      currentPage -= 1;
      renderTable();
    });
    document.getElementById("nextPageBtn").addEventListener("click", function () {
      currentPage += 1;
      renderTable();
    });

    document.getElementById("clearTestDataBtn").addEventListener("click", async function () {
      if (!confirm(
        "Удалить всех пользователей, их заявки на курсы и отзывы?\n\nУчётная запись администратора не затрагивается."
      )) return;

      const { ok, data } = await apiRequest("/admin/clear-test-data", { method: "POST" });
      if (!ok) {
        showToast(data.message || "Не удалось очистить данные.", "error");
        return;
      }
      const d = data.deleted || {};
      showToast(
        "Удалено: пользователей — " + (d.users || 0) +
        ", заявок — " + (d.applications || 0) +
        ", отзывов — " + (d.feedbacks || 0) + ".",
        "success"
      );
      await loadApplications();
    });

    document.getElementById("logoutLink").addEventListener("click", async function (event) {
      event.preventDefault();
      await apiRequest("/logout", { method: "POST" });
      sessionStorage.clear();
      window.location.href = "login.html";
    });

    loadApplications();
  </script>
</body>
</html>
