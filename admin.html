<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корочки.есть — Панель администратора</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card card-wide">
    <h1>Корочки.есть</h1>
    <p>Панель администратора — все заявки пользователей</p>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Логин</th>
            <th>ФИО</th>
            <th>Курс</th>
            <th>Начало обучения</th>
            <th>Оплата</th>
            <th>Дата подачи</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>

    <p id="emptyAdmin" class="note" hidden>Заявок от пользователей пока нет.</p>

    <p class="link-row">
      <a href="#" id="logoutLink">Выйти из панели</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (sessionStorage.getItem("isAdmin") !== "true") {
      window.location.href = "login.html";
    }

    const tableBody = document.getElementById("adminTableBody");
    const emptyAdmin = document.getElementById("emptyAdmin");
    const STATUS_OPTIONS = ["Новая", "Идет обучение", "Обучение завершено"];

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("ru-RU", {
        day: "2-digit", month: "2-digit", year: "numeric",
      });
    }

    async function renderTable() {
      const { ok, data } = await apiRequest("/admin/applications");
      tableBody.innerHTML = "";

      if (!ok || !data.applications || data.applications.length === 0) {
        emptyAdmin.hidden = false;
        return;
      }

      emptyAdmin.hidden = true;

      data.applications.forEach(function (app) {
        const row = document.createElement("tr");
        const select = document.createElement("select");
        select.className = "status-select";

        STATUS_OPTIONS.forEach(function (status) {
          const option = document.createElement("option");
          option.value = status;
          option.textContent = status;
          if (status === app.status) option.selected = true;
          select.appendChild(option);
        });

        select.addEventListener("change", async function () {
          await apiRequest("/admin/applications", {
            method: "POST",
            body: JSON.stringify({ id: app.id, status: select.value }),
          });
        });

        row.innerHTML =
          "<td>" + app.login + "</td>" +
          "<td>" + app.fio + "</td>" +
          "<td>" + app.course + "</td>" +
          "<td>" + app.startDate + "</td>" +
          "<td>" + app.paymentLabel + "</td>" +
          "<td>" + formatDate(app.createdAt) + "</td>";

        const statusCell = document.createElement("td");
        statusCell.appendChild(select);
        row.appendChild(statusCell);
        tableBody.appendChild(row);
      });
    }

    document.getElementById("logoutLink").addEventListener("click", async function (event) {
      event.preventDefault();
      await apiRequest("/logout", { method: "POST" });
      sessionStorage.clear();
      window.location.href = "login.html";
    });

    renderTable();
  </script>
</body>
</html>
